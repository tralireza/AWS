---
- hosts: vServer
  vars:
    # ec2Store_passwd: ""
    # -e "{ec2Store_passwd: 'MyPasswd'}"

  pre_tasks:
    - include_vars: vars.yml   # provides ec2str (used by the cryptsetup by-id path)
      tags:
        - always

  tasks:
  - debug:
      msg: "=> {{ ec2Store_passwd }}   Q: {{ ec2Store_passwd|quote }}"
    tags:
      - vars
      - ec2str

  - systemd:
      name: "{{ item }}"
      state: stopped
    loop: ["postfix"]
    tags: stp
    name: "systemd: instance's |P"
    ignore_errors: true   # postfix may not be installed yet on a fresh AL2023 boot

  - copy:
      content: "ssh-rsa  My.rsa\necdsa-sha2-nistp521 AAAAE2VjZHNhLXNoYTItbmlzdHA1MjEAAAAIbmlzdHA1MjEAAACFBABYrSEK/OsEcWv/f/S3/QbtMOlXvsRRRYpdALh5ZBI0nBdZkkJxyK4t8yWTD1yHgngEHk9GN3QugDoll2rk7CxqtAFCqBuyOHccIHYq8FDlgd/lMLwqVQtPN1kQ4s52XSPl5xzujd2pvmlXWz5nzYMxvczHfW3wAHvcdsi8QOPT4tj7nQ== My.ec\n"
      dest: /root/.ssh/authorized_keys
      mode: 0400
    tags: key
    name: "copy: authorized_keys"

  # EPEL removed: AL2023 has no amazon-linux-extras, and every required package
  # (incl. certbot, perl-Mail-SPF, perl-Mail-DKIM) is in the core amazonlinux repo.

  # AL2023 (Python 3.9): native dnf: module replaces the old shell-yum workarounds.
  # openssl11-devel -> openssl-devel (OpenSSL 3.x); rsyslog added (not preinstalled,
  # needed by the restart task); mailx still in core.
  - dnf:
      name:
        - bind
        - openssl-devel
        - perl-Mail-SPF
        - perl-Mail-DKIM
        - perl-Sys-Syslog
        - httpd
        - mod_ssl
        - squid
        - mailx
        - rsyslog
        - nftables   # native AL2023 firewall (replaces AL2 iptables + xt_recent)
        - cronie     # cron daemon (not preinstalled on AL2023) — runs /ec2str/crontab.l jobs
      state: present
    tags: pkg
    name: "dnf: install packages"

  # AL2023: python2-certbot-apache -> python3-certbot-apache (no Python 2); both in core
  - dnf:
      name:
        - certbot
        - python3-certbot-apache
      state: present
    tags: pkg
    name: "dnf: install certbot"

  - shell: mount| grep /ec2Store| wc -l
    args:
      executable: /bin/bash
    register: ec2Store_mountState
    tags: ec2str

  - block:
    - file:
        path: /ec2Store
        state: directory
    # cryptsetup target: stable by-id path for the data volume (ec2str with the
    # hyphen stripped = the NVMe serial). On AL2023/Nitro this resolves to the same
    # device as the legacy /dev/xvdx symlink (was: cryptsetup create ec2Store /dev/xvdx).
    # Cipher/key-size/hash pinned explicitly (= the original `create` defaults: cipher &
    # key-size confirmed via dmsetup table, hash = plain-mode default ripemd160) so the
    # volume opens correctly regardless of future cryptsetup default changes.
    - shell: (cryptsetup close ec2Store || true)
        && echo {{ ec2Store_passwd|quote }} | cryptsetup open --type plain --cipher aes-cbc-essiv:sha256 --key-size 256 --hash ripemd160 /dev/disk/by-id/nvme-Amazon_Elastic_Block_Store_{{ ec2str | replace('-', '') }} ec2Store
        && mount /dev/mapper/ec2Store /ec2Store && ln -s /ec2Store /ec2str
      args:
        executable: /bin/bash
      no_log: true   # passphrase is on the command line — keep it out of logs
    when: ec2Store_mountState.stdout == "0"
    tags: ec2str

  # load nftables firewall from the encrypted volume — needs the nftables pkg + /ec2str
  # mounted (above), so it runs here, NOT via nftables.service at boot (/ec2str isn't
  # mounted that early). Tag: fw  →  run standalone with `-t fw`.
  - shell: nft -f /ec2str/firewall.nft
    tags: fw
    name: "nft: load firewall"

  # AL2 tarball (Postfix 3.9.0, linked against OpenSSL 1.1) — won't link on AL2023.
  # Replaced by the native AL2023 package (3.7.2, OpenSSL 3.5) below.
  # - shell: tar -C / -xzf /ec2str/postfix-390.tar.gz
  #   tags: pfx3
  #   name: "shell: install Postfix3"

  - dnf:
      name: postfix
      state: present
    tags: pfx3
    name: "dnf: Postfix3"

  - shell: (mv /etc/{{ item }} /etc/{{ item }}___ || true)
      && (ln -s /ec2str/{{ item }} /etc/{{ item }} || true)
    loop: ["httpd", "postfix", "squid"]
    tags: etc
    name: "shell: /etc/DIR(H|P|S)"

  - shell: (mv /etc/named.conf /etc/named.conf___ || true)
      && (ln -s /ec2str/named/named.conf /etc/named.conf || true)
    tags: etc
    name: "shell: /etc/named.conf"

  - shell: cp /ec2str/postfix/aliases /etc/aliases && newaliases
    name: "shell: postfix aliases"
    tags: etc

  - user:
      name: "{{ item }}"
      comment: "{{ item }} User"
      shell: /sbin/nologin
    loop: ["spf", "dkim"]
    tags: usr
    name: "user: SPF & DKIM user"

  - block:
    - file:
        path: /etc/systemd/system/postfix.service.d
        state: directory
      name: "file: Postfix override"
    - copy:
        content: "[Service]\nPIDFile=/ec2str/spool/postfix/pid/master.pid\n"
        dest: /etc/systemd/system/postfix.service.d/override.conf
        mode: 0644
      name: "copy: override.conf"
    - shell: systemctl daemon-reload
      name: "shell: [P] daemon-reload"
    tags: pid
    name: "block: Postfix master.pid"

  - shell: (rm -f /ec2str/dkimproxy/var/run/dkimproxy_*.pid || true) && /ec2str/dkimproxy/init-script start 
    tags: dkim
    name: "shell: start DKIM in/out"

  - block:
    - shell: hostname ec2svr && echo "export PS1='\h \w \\\$ '" >> /root/.bashrc
      name: "shell: ec2svr & PS1"
    - systemd:
        state: restarted
        name: "{{ item }}"
        enabled: yes
        masked: no
      loop: ["httpd", "rsyslog", "squid", "postfix", "named"]
      name: "systemd: restart H|L|S|P|N"
    tags: run
